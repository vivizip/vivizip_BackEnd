version: '3.8'

services:
  app:
    build: .
    container_name: vivizip-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - vivizip-network

  redis:
    image: redis:7-alpine
    container_name: vivizip-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - vivizip-network

networks:
  vivizip-network:
    driver: bridge

volumes:
  redis-data: