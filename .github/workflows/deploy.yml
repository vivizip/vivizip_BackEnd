name: Deploy vivizip

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/vivizip
            if [ ! -f .env ]; then
              echo "❌ .env 파일이 존재하지 않아 배포를 중단합니다."
              exit 1
            fi
            git pull origin main
            docker compose down
            docker compose up -d --build